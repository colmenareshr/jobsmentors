name: tao-train-pointpillars
network_arch: pointpillars
automl_enabled: true
container_image: tao_toolkit.pyt
data_format: default
gpu_spec_key: train.num_gpus
actions:
  dataset_convert:
    command: pointpillars dataset_convert -e {config_path}
    config_format: yaml
    mode: config
    inputs:
      dataset.data_path:
        type: folder
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
  train:
    command: pointpillars train -e {config_path}
    config_format: yaml
    mode: config
    inputs:
      dataset.data_path:
        type: folder
      dataset.data_info_path:
        type: folder
      model.pretrained_model_path:
        type: file
        optional: true
      train.resume_training_checkpoint_path:
        type: file
        optional: true
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
  prune:
    command: pointpillars prune -e {config_path}
    config_format: yaml
    mode: config
    inputs:
      dataset.data_path:
        type: folder
      dataset.data_info_path:
        type: folder
      prune.model:
        type: file
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
  evaluate:
    command: pointpillars evaluate -e {config_path}
    config_format: yaml
    mode: config
    inputs:
      dataset.data_path:
        type: folder
      dataset.data_info_path:
        type: folder
      evaluate.checkpoint:
        type: file
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
  retrain:
    command: pointpillars train -e {config_path}
    config_format: yaml
    mode: config
    inputs:
      dataset.data_path:
        type: folder
      dataset.data_info_path:
        type: folder
      train.pruned_model_path:
        type: file
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
  export:
    command: pointpillars export -e {config_path}
    config_format: yaml
    mode: config
    inputs:
      dataset.data_path:
        type: folder
      dataset.data_info_path:
        type: folder
      export.checkpoint:
        type: file
    outputs:
      results_dir:
        type: folder
      export.onnx_file:
        type: file
    upload_excludes:
    - inputs/
  inference:
    command: pointpillars inference -e {config_path}
    config_format: yaml
    mode: config
    inputs:
      dataset.data_path:
        type: folder
      dataset.data_info_path:
        type: folder
      inference.checkpoint:
        type: file
      inference.trt_engine:
        type: file
        optional: true
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
data_sources:
  dataset_convert:
    dataset.data_path:
      source: train_datasets
      path: ''
  train:
    dataset.data_path:
      source: train_datasets
      path: ''
  prune:
    dataset.data_path:
      source: train_datasets
      path: ''
  evaluate:
    dataset.data_path:
      source: train_datasets
      path: ''
  retrain:
    dataset.data_path:
      source: train_datasets
      path: ''
  export:
    dataset.data_path:
      source: train_datasets
      path: ''
  inference:
    dataset.data_path:
      source: inference_dataset
      path: ''
spec_params:
  dataset_convert:
    results_dir: output_dir
  train:
    key: key
    results_dir: output_dir
    model.pretrained_model_path: ptm_if_no_resume_model
    train.resume_training_checkpoint_path: resume_model
  prune:
    key: key
    results_dir: output_dir
    prune.model: parent_model
  evaluate:
    key: key
    results_dir: output_dir
    evaluate.checkpoint: parent_model
  retrain:
    key: key
    results_dir: output_dir
    train.pruned_model_path: parent_model
  export:
    key: key
    results_dir: output_dir
    export.checkpoint: parent_model
    export.onnx_file: create_onnx_file
  inference:
    key: key
    results_dir: output_dir
    inference.checkpoint: parent_model
    inference.trt_engine: parent_model
key_defaults: {}
spec_shorthand_keys:
  num_epochs: train.num_epochs
  batch_size: train.batch_size
  evaluate_batch_size: evaluate.batch_size
  inference_batch_size: inference.batch_size
  export_batch_size: export.batch_size
  learning_rate: train.lr
  num_gpus: train.num_gpus
  num_workers: dataset.num_workers
  resume_checkpoint: train.resume_training_checkpoint_path
  pretrained_model: model.pretrained_model_path
  pruned_model: train.pruned_model_path
  export_onnx: export.onnx_file
  export_data_type: export.data_type
  score_thresh: model.post_processing.score_thresh
spec_templates:
  dataset_convert: ../references/spec_template_dataset_convert.yaml
  train: ../references/spec_template_train.yaml
  prune: ../references/spec_template_prune.yaml
  evaluate: ../references/spec_template_evaluate.yaml
  retrain: ../references/spec_template_retrain.yaml
  export: ../references/spec_template_export.yaml
  inference: ../references/spec_template_inference.yaml
description: PointPillars for 3D object detection from LiDAR point clouds. Encodes point clouds into a pseudo-image via pillar-based
  representation, then applies 2D detection. Used in autonomous driving / robotics.
