name: ocrnet-deploy
type: model
network_arch: ocrnet
container_image: tao_toolkit.deploy
data_format: default
actions:
  gen_trt_engine:
    command: ocrnet gen_trt_engine -e {config_path}
    config_format: yaml
    mode: config
    inputs:
      gen_trt_engine.onnx_file:
        type: file
      dataset.character_list_file:
        type: file
      gen_trt_engine.tensorrt.calibration.cal_image_dir:
        type: folder
        optional: true
    outputs:
      results_dir:
        type: folder
      gen_trt_engine.trt_engine:
        type: file
      gen_trt_engine.tensorrt.calibration.cal_cache_file:
        type: file
    upload_excludes:
    - inputs/
  evaluate:
    command: ocrnet evaluate -e {config_path}
    config_format: yaml
    mode: config
    inputs:
      evaluate.trt_engine:
        type: file
      evaluate.test_dataset_dir:
        type: folder
      evaluate.test_dataset_gt_file:
        type: file
        optional: true
      dataset.character_list_file:
        type: file
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
  inference:
    command: ocrnet inference -e {config_path}
    config_format: yaml
    mode: config
    inputs:
      inference.trt_engine:
        type: file
      inference.inference_dataset_dir:
        type: folder
      dataset.character_list_file:
        type: file
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
data_sources:
  gen_trt_engine:
    dataset.character_list_file:
      source: eval_dataset
      path: character_list
    gen_trt_engine.tensorrt.calibration.cal_image_dir:
      source: calibration_dataset
      path: train.tar.gz
      runtime: extracted_folder
      list: true
  evaluate:
    dataset.character_list_file:
      source: eval_dataset
      path: character_list
    evaluate.test_dataset_dir:
      source: eval_dataset
      path: test.tar.gz
      runtime: extracted_folder
    evaluate.test_dataset_gt_file:
      source: eval_dataset
      path: test/gt_new.txt
  inference:
    dataset.character_list_file:
      source: eval_dataset
      path: character_list
    inference.inference_dataset_dir:
      source: inference_dataset
      path: test.tar.gz
      runtime: extracted_folder
spec_params:
  gen_trt_engine:
    encryption_key: key
    results_dir: output_dir
    gen_trt_engine.results_dir: output_dir
    gen_trt_engine.onnx_file: parent_model
    gen_trt_engine.trt_engine: create_engine_file
    gen_trt_engine.tensorrt.calibration.cal_cache_file: create_cal_cache
  evaluate:
    encryption_key: key
    results_dir: output_dir
    evaluate.trt_engine: parent_model
  inference:
    encryption_key: key
    results_dir: output_dir
    inference.trt_engine: parent_model
spec_shorthand_keys:
  trt_data_type: gen_trt_engine.tensorrt.data_type
  trt_engine: gen_trt_engine.trt_engine
  batch_size: dataset.batch_size
  character_list: dataset.character_list_file
  input_width: model.input_width
  input_height: model.input_height
  input_channel: model.input_channel
  cal_batch_size: gen_trt_engine.tensorrt.calibration.cal_batch_size
  cal_batches: gen_trt_engine.tensorrt.calibration.cal_batches
  trt_min_batch_size: gen_trt_engine.tensorrt.min_batch_size
  trt_opt_batch_size: gen_trt_engine.tensorrt.opt_batch_size
  trt_max_batch_size: gen_trt_engine.tensorrt.max_batch_size
description: OCRNet deploy workflow for gen_trt_engine, evaluate, inference using
  TAO Deploy.
spec_templates:
  gen_trt_engine: spec_template_deploy_experiment.yaml
  evaluate: spec_template_deploy_experiment.yaml
  inference: spec_template_deploy_experiment.yaml
notes:
- OCRNet deploy uses the shared experiment spec for all three actions.
- Use FP16 for the starter-kit TensorRT engine path when the target hardware supports
  it.
- Keep model.input_width, model.input_height, model.input_channel, and
  dataset.character_list_file aligned with training/export.
- gen_trt_engine.tensorrt.calibration.cal_image_dir must be serialized as a YAML
  list, even when only one calibration folder is provided.
