model_name: ''
encryption_key: ''
results_dir: ''
wandb:
  enable: true
  project: TAO Toolkit
  entity: ''
  group: ''
  tags:
  - tao-toolkit
  reinit: false
  sync_tensorboard: false
  save_code: false
  name: TAO Toolkit Training
  run_id: ''
dataset:
  batch_size: 1
  train_data_sources: ''
  val_data_sources: ''
  num_workers_per_gpu: 2
  augmentation:
    input_size: 224
    mean:
    - 0.485
    - 0.456
    - 0.406
    std:
    - 0.229
    - 0.224
    - 0.225
    min_scale: 0.1
    max_scale: 2.0
    min_ratio: 0.75
    max_ratio: 1.33
    hflip: 0.5
    re_prob: 0.0
    interpolation: bilinear
    smoothing: 0.1
    color_jitter: 0.0
    auto_aug: rand-m9-mstd0.5-inc1
    mixup: 0.8
    cutmix: 1.0
    mixup_prob: 1.0
    mixup_switch_prob: 0.5
    mixup_mode: batch
train:
  num_gpus: 1
  gpu_ids:
  - 0
  num_nodes: 1
  seed: 1234
  cudnn:
    benchmark: false
    deterministic: true
  num_epochs: 10
  checkpoint_interval: 1
  checkpoint_interval_unit: epoch
  validation_interval: 1
  resume_training_checkpoint_path: ''
  results_dir: ''
  stage: pretrain
  accum_grad_batches: 1
  pretrained_model_path: ''
  precision: fp32
  distributed_strategy: ddp
  optim:
    type: AdamW
    monitor_name: train_loss
    lr: 0.0002
    backbone_multiplier: 0.1
    momentum: 0.9
    weight_decay: 0.05
    layer_decay: 0.75
    lr_scheduler: MultiStep
    milestones:
    - 88
    - 96
    gamma: 0.1
    warmup_epochs: 1
  norm_pix_loss: true
  freeze: []
  mask_ratio: 0.75
model:
  arch: convnextv2_base
  num_classes: 1
  drop_path_rate: 0.1
  global_pool: true
  decoder_depth: 1
  decoder_embed_dim: 512
export:
  results_dir: ''
  gpu_id: 0
  checkpoint: ???
  onnx_file: ???
  on_cpu: false
  input_channel: 3
  input_width: 960
  input_height: 544
  opset_version: 17
  batch_size: -1
  verbose: false
  format: onnx
