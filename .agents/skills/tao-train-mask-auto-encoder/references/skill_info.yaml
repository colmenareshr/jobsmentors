name: tao-train-mask-auto-encoder
network_arch: mae
automl_enabled: true
container_image: tao_toolkit.pyt
data_format: ssl
gpu_spec_key: train.num_gpus
actions:
  train:
    command: mae train -e {config_path}
    config_format: yaml
    mode: config
    inputs:
      dataset.train_data_sources:
        type: folder
      dataset.val_data_sources:
        type: folder
      train.pretrained_model_path:
        type: file
        optional: true
      train.resume_training_checkpoint_path:
        type: file
        optional: true
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
  evaluate:
    command: mae evaluate -e {config_path}
    config_format: yaml
    mode: config
    inputs:
      evaluate.checkpoint:
        type: file
      dataset.val_data_sources:
        type: folder
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
  export:
    command: mae export -e {config_path}
    config_format: yaml
    mode: config
    inputs:
      export.checkpoint:
        type: file
    outputs:
      results_dir:
        type: folder
      export.onnx_file:
        type: file
    upload_excludes:
    - inputs/
  inference:
    command: mae inference -e {config_path}
    config_format: yaml
    mode: config
    inputs:
      inference.checkpoint:
        type: file
      dataset.test_data_sources:
        type: folder
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
data_sources:
  train:
    dataset.train_data_sources:
      source: train_datasets
      path: images_train.tar.gz
      runtime: extracted_folder
    dataset.val_data_sources:
      source: eval_dataset
      path: images_val.tar.gz
      runtime: extracted_folder
  evaluate:
    dataset.val_data_sources:
      source: eval_dataset
      path: images_val.tar.gz
      runtime: extracted_folder
  inference:
    dataset.test_data_sources:
      source: inference_dataset
      path: images_test.tar.gz
      runtime: extracted_folder
spec_params:
  train:
    encryption_key: key
    results_dir: output_dir
    train.pretrained_model_path: ptm_if_no_resume_model
    train.resume_training_checkpoint_path: resume_model
  evaluate:
    encryption_key: key
    evaluate.checkpoint: parent_model
    results_dir: output_dir
  export:
    encryption_key: key
    export.checkpoint: parent_model
    export.onnx_file: create_onnx_file
    results_dir: output_dir
  inference:
    encryption_key: key
    inference.checkpoint: parent_model
    results_dir: output_dir
key_defaults: {}
spec_shorthand_keys:
  num_epochs: train.num_epochs
  batch_size: dataset.batch_size
  learning_rate: train.optim.lr
  num_classes: model.num_classes
  stage: train.stage
  arch: model.arch
  image_size: dataset.augmentation.input_size
  resume_checkpoint: train.resume_training_checkpoint_path
spec_templates:
  train: ../references/spec_template_train.yaml
  evaluate: ../references/spec_template_evaluate.yaml
  export: ../references/spec_template_export.yaml
  inference: ../references/spec_template_inference.yaml
description: MAE (Masked Autoencoder) for self-supervised pretraining and fine-tuning. Masks random patches and reconstructs
  them to learn visual representations. Supports pretrain and finetune stages.
