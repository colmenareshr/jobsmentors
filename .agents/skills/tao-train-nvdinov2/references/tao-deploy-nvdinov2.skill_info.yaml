name: nvdinov2-deploy
type: model
network_arch: nvdinov2
container_image: tao_toolkit.deploy
data_format: ssl
actions:
  gen_trt_engine:
    command: nvdinov2 gen_trt_engine -e {config_path}
    config_format: yaml
    mode: config
    inputs:
      gen_trt_engine.onnx_file:
        type: file
    outputs:
      results_dir:
        type: folder
      gen_trt_engine.trt_engine:
        type: file
    upload_excludes:
    - inputs/
spec_params:
  gen_trt_engine:
    results_dir: output_dir
    gen_trt_engine.onnx_file: parent_model
    gen_trt_engine.trt_engine: create_engine_file
spec_shorthand_keys:
  trt_data_type: gen_trt_engine.tensorrt.data_type
  trt_engine: gen_trt_engine.trt_engine
  batch_size: gen_trt_engine.batch_size
  image_size: model.backbone.img_size
  teacher_type: model.backbone.teacher_type
  student_type: model.backbone.student_type
  trt_min_batch_size: gen_trt_engine.tensorrt.min_batch_size
  trt_opt_batch_size: gen_trt_engine.tensorrt.opt_batch_size
  trt_max_batch_size: gen_trt_engine.tensorrt.max_batch_size
description: NvDINOv2 deploy workflow for gen_trt_engine using TAO Deploy.
spec_templates:
  gen_trt_engine: spec_template_deploy_gen_trt_engine.yaml
notes:
- TAO Deploy exposes `gen_trt_engine` for NvDINOv2; checkpoint inference remains
  in the workflow, while TensorRT engines are for consumer runtimes.
- Keep `model.backbone.img_size` aligned with the exported backbone, with 518 as the
  deploy template default.
- Keep the TensorRT min/opt/max batch profile fixed at 1 unless the exported ONNX
  graph has been verified with a wider dynamic profile.
