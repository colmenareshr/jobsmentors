name: tao-train-optical-inspection
network_arch: optical_inspection
automl_enabled: true
container_image: tao_toolkit.pyt
data_format: default
gpu_spec_key: train.num_gpus
actions:
  train:
    command: optical_inspection train -e {config_path}
    config_format: yaml
    mode: config
    inputs:
      dataset.train_dataset.images_dir:
        type: folder
      dataset.train_dataset.csv_path:
        type: file
      dataset.validation_dataset.images_dir:
        type: folder
      dataset.validation_dataset.csv_path:
        type: file
      dataset.test_dataset.images_dir:
        type: folder
      dataset.test_dataset.csv_path:
        type: file
      train.pretrained_model_path:
        type: file
        optional: true
      train.resume_training_checkpoint_path:
        type: file
        optional: true
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
  evaluate:
    command: optical_inspection evaluate -e {config_path}
    config_format: yaml
    mode: config
    inputs:
      dataset.test_dataset.images_dir:
        type: folder
      dataset.test_dataset.csv_path:
        type: file
      evaluate.checkpoint:
        type: file
      evaluate.trt_engine:
        type: file
        optional: true
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
  export:
    command: optical_inspection export -e {config_path}
    config_format: yaml
    mode: config
    inputs:
      export.checkpoint:
        type: file
    outputs:
      results_dir:
        type: folder
      export.onnx_file:
        type: file
    upload_excludes:
    - inputs/
  inference:
    command: optical_inspection inference -e {config_path}
    config_format: yaml
    mode: config
    inputs:
      dataset.infer_dataset.images_dir:
        type: folder
      dataset.infer_dataset.csv_path:
        type: file
      inference.checkpoint:
        type: file
      inference.trt_engine:
        type: file
        optional: true
    outputs:
      results_dir:
        type: folder
    upload_excludes:
    - inputs/
data_sources:
  train:
    dataset.train_dataset.images_dir:
      source: train_datasets
      path: images.tar.gz
      runtime: extracted_folder
    dataset.train_dataset.csv_path:
      source: train_datasets
      path: dataset.csv
    dataset.validation_dataset.images_dir:
      source: eval_dataset
      path: images.tar.gz
      runtime: extracted_folder
    dataset.validation_dataset.csv_path:
      source: eval_dataset
      path: dataset.csv
    dataset.test_dataset.images_dir:
      source: eval_dataset
      path: images.tar.gz
      runtime: extracted_folder
    dataset.test_dataset.csv_path:
      source: eval_dataset
      path: dataset.csv
  evaluate:
    dataset.test_dataset.images_dir:
      source: eval_dataset
      path: images.tar.gz
      runtime: extracted_folder
    dataset.test_dataset.csv_path:
      source: eval_dataset
      path: dataset.csv
  inference:
    dataset.infer_dataset.images_dir:
      source: inference_dataset
      path: images.tar.gz
      runtime: extracted_folder
    dataset.infer_dataset.csv_path:
      source: inference_dataset
      path: dataset.csv
spec_params:
  train:
    encryption_key: key
    results_dir: output_dir
    train.pretrained_model_path: ptm_if_no_resume_model
    train.resume_training_checkpoint_path: resume_model
  evaluate:
    encryption_key: key
    results_dir: output_dir
    evaluate.checkpoint: parent_model
    evaluate.trt_engine: parent_model
  export:
    encryption_key: key
    results_dir: output_dir
    export.checkpoint: parent_model
    export.onnx_file: create_onnx_file
  inference:
    encryption_key: key
    results_dir: output_dir
    inference.checkpoint: parent_model
    inference.trt_engine: parent_model
key_defaults: {}
spec_shorthand_keys:
  num_epochs: train.num_epochs
  batch_size: dataset.batch_size
  eval_batch_size: evaluate.batch_size
  inference_batch_size: inference.batch_size
  learning_rate: train.optim.lr
  resume_checkpoint: train.resume_training_checkpoint_path
  pretrained_model: train.pretrained_model_path
  export_onnx: export.onnx_file
  export_width: export.input_width
  export_height: export.input_height
  export_batch_size: export.batch_size
  model_type: model.model_type
  model_backbone: model.model_backbone
  embedding_vectors: model.embedding_vectors
  num_input: dataset.num_input
  image_width: dataset.image_width
  image_height: dataset.image_height
  workers: dataset.workers
spec_templates:
  train: ../references/spec_template_train.yaml
  evaluate: ../references/spec_template_evaluate.yaml
  inference: ../references/spec_template_inference.yaml
  export: ../references/spec_template_export.yaml
description: Optical inspection for defect detection using Siamese networks. Compares image pairs to detect manufacturing
  defects, anomalies, or quality issues.
