encryption_key: tlt_encode
results_dir: /results
model:
  backbone:
    type: fan_small_12_p4_hybrid
  decode_head:
    feature_strides: [4, 8, 16, 32]
dataset:
  segment:
    dataset: SFDataset
    root_dir: /data/segformer
    label_transform: norm
    batch_size: 1
    workers: 4
    num_classes: 2
    img_size: 256
    train_split: train
    validation_split: val
    test_split: val
    predict_split: test
    augmentation:
      mean: [0.5, 0.5, 0.5]
      std: [0.5, 0.5, 0.5]
    palette:
    - seg_class: foreground
      rgb: [0, 0, 0]
      label_id: 0
      mapping_class: foreground
    - seg_class: background
      rgb: [1, 1, 1]
      label_id: 1
      mapping_class: background
inference:
  trt_engine: /results/segformer.engine
