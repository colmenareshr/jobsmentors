name: tao-setup-nvidia-gpu-host
type: platform
actions:
  check_docker:
    description: Read-only probe of the Docker-backend host GPU runtime (NVIDIA driver, CUDA toolkit, NVIDIA Container Toolkit). Makes no changes and is safe to run anytime. Run this before install_docker.
    command: bash skills/platform/tao-setup-nvidia-gpu-host/scripts/setup-nvidia-gpu-host.sh --backend docker --check-only
    mode: passthrough
    inputs: {}
    outputs:
      runtime_status: {type: text}
  install_docker:
    description: >-
      Installs/repairs the Docker-backend host GPU runtime (NVIDIA driver, CUDA toolkit, NVIDIA Container Toolkit, and Docker).
      WARNING - this makes significant, host-modifying system changes: it adds package repositories, installs system packages,
      may restart the Docker daemon, and adds the invoking user to the docker group. SAFEGUARDS - run check_docker first and
      review its output; invoke only after the user has explicitly approved; the underlying script prompts for confirmation
      before changing anything unless the agent appends the assume-yes flag for a non-interactive run. Do not invoke
      unattended or speculatively.
    command: bash skills/platform/tao-setup-nvidia-gpu-host/scripts/setup-nvidia-gpu-host.sh --backend docker --install
    mode: passthrough
    inputs: {}
    outputs:
      runtime_status: {type: text}
  check_kubernetes:
    description: Read-only probe of a Kubernetes GPU worker host's runtime (NVIDIA driver, CUDA toolkit, NVIDIA Container Toolkit). Makes no changes and is safe to run anytime. Run this before install_kubernetes.
    command: bash skills/platform/tao-setup-nvidia-gpu-host/scripts/setup-nvidia-gpu-host.sh --backend kubernetes --check-only
    mode: passthrough
    inputs: {}
    outputs:
      runtime_status: {type: text}
  install_kubernetes:
    description: >-
      Installs/repairs a Kubernetes GPU worker host's runtime (NVIDIA driver, CUDA toolkit, NVIDIA Container Toolkit).
      WARNING - this makes significant, host-modifying system changes: it adds package repositories and installs system
      packages on the worker node. SAFEGUARDS - run check_kubernetes first and review its output; invoke only after the
      user has explicitly approved; the underlying script prompts for confirmation before changing anything unless the
      agent appends the assume-yes flag for a non-interactive run. Do not invoke unattended or speculatively.
    command: bash skills/platform/tao-setup-nvidia-gpu-host/scripts/setup-nvidia-gpu-host.sh --backend kubernetes --install
    mode: passthrough
    inputs: {}
    outputs:
      runtime_status: {type: text}
