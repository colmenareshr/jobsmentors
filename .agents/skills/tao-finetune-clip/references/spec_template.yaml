model_name: clip
encryption_key: ''
results_dir: ''
wandb:
  enable: true
  project: TAO Toolkit
  entity: ''
  group: ''
  tags:
  - tao-toolkit
  reinit: false
  sync_tensorboard: false
  save_code: false
  name: TAO Toolkit Training
  run_id: ''
model:
  type: ViT-L-14-SigLIP-CLIPA-224
  adaptor_name: null
  freeze_vision_encoder: false
  freeze_text_encoder: false
  image_size: 224
  canonicalize_text: false
dataset:
  seed: 42
  train:
    datasets: []
    batch_size: 16
    num_workers: 8
    type: custom
    wds:
      root_dir: null
      shard_list_file: null
      samples_per_shard: 10000
  val:
    datasets: []
    batch_size: 16
    num_workers: 8
  augmentation:
    scale:
    - 0.4
    - 1.0
    color_jitter:
    - 0.8
    - 0.32
    - 0.32
    - 0.32
    - 0.08
    grayscale: 0.2
  pin_memory: true
train:
  num_gpus: 1
  gpu_ids:
  - 0
  num_nodes: 1
  seed: 1234
  cudnn:
    benchmark: false
    deterministic: true
  num_epochs: 10
  checkpoint_interval: 1
  checkpoint_interval_unit: epoch
  validation_interval: 1
  val_check_interval: null
  pretrained_model_path: null
  resume_training_checkpoint_path: null
  results_dir: ''
  optim:
    optimizer_type: adamw
    vision_lr: 0.0001
    text_lr: 0.0001
    weight_decay: 0.0001
    betas:
    - 0.9
    - 0.95
    eps: 1.0e-06
    warmup_steps: 100
    scheduler: cosine
  loss_type: siglip
  precision: fp16
  grad_checkpointing: false
  grad_clip_norm: null
  distributed_strategy: ddp
evaluate:
  checkpoint: null
  trt_engine: null
  batch_size: 16
inference:
  checkpoint: null
  trt_engine: null
  datasets: []
  text_file: null
  batch_size: 16
export:
  checkpoint: null
  onnx_file: ${results_dir}/export/clip_model.onnx
  encoder_type: combined
  input_height: 224
  input_width: 224
  batch_size: -1
  opset_version: 17
gen_trt_engine:
  onnx_file: ${results_dir}/export/clip_model.onnx
  trt_engine: ${results_dir}/deploy/clip_model.engine
  batch_size: -1
  tensorrt:
    workspace_size: 4096
    data_type: fp16
    min_batch_size: 1
    opt_batch_size: 1
    max_batch_size: 16
